<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Inference Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input[type="number"],
        input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-value {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .response-section {
            margin-top: 30px;
            padding: 25px;
            background: #f9f9f9;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .response-header h3 {
            color: #333;
            font-size: 1.2em;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .response-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
            min-height: 100px;
        }

        .response-meta {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #666;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        @media (max-width: 768px) {
            .settings {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 LLM Inference Platform</h1>
            <p>Interact with Large Language Models via Kafka</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="input-group">
                    <label for="prompt">Enter your prompt:</label>
                    <textarea 
                        id="prompt" 
                        placeholder="Type your question or prompt here...&#10;&#10;Example: What is machine learning?&#10;Or: Write a short story about AI"
                    ></textarea>
                </div>

                <div class="settings">
                    <div class="input-group">
                        <label for="maxTokens">Max Tokens: <span id="maxTokensValue">512</span></label>
                        <input 
                            type="range" 
                            id="maxTokens" 
                            min="50" 
                            max="1024" 
                            value="512" 
                            step="50"
                        >
                    </div>

                    <div class="input-group">
                        <label for="temperature">Temperature: <span id="temperatureValue">0.7</span></label>
                        <div class="range-container">
                            <input 
                                type="range" 
                                id="temperature" 
                                min="0" 
                                max="2" 
                                value="0.7" 
                                step="0.1"
                            >
                            <span class="range-value" id="temperatureDisplay">0.7</span>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="submitBtn" onclick="submitRequest()">
                        Generate Response
                    </button>
                    <button class="btn-secondary" onclick="clearResponse()">
                        Clear
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Processing your request...</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <div class="response-section" id="responseSection" style="display: none;">
                <div class="response-header">
                    <h3>Response</h3>
                    <span class="status-badge" id="statusBadge">Pending</span>
                </div>
                <div class="response-content" id="responseContent"></div>
                <div class="response-meta" id="responseMeta"></div>
            </div>
        </div>
    </div>

    <script>
        // Update range value displays
        document.getElementById('maxTokens').addEventListener('input', function(e) {
            document.getElementById('maxTokensValue').textContent = e.target.value;
        });

        document.getElementById('temperature').addEventListener('input', function(e) {
            const value = parseFloat(e.target.value).toFixed(1);
            document.getElementById('temperatureValue').textContent = value;
            document.getElementById('temperatureDisplay').textContent = value;
        });

        async function submitRequest() {
            const prompt = document.getElementById('prompt').value.trim();
            
            if (!prompt) {
                showError('Please enter a prompt');
                return;
            }

            // Disable button and show loading
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            document.getElementById('loading').classList.add('active');
            document.getElementById('errorMessage').classList.remove('active');
            document.getElementById('responseSection').style.display = 'none';

            try {
                const maxTokens = parseInt(document.getElementById('maxTokens').value);
                const temperature = parseFloat(document.getElementById('temperature').value);

                const response = await fetch('/api/inference', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        max_tokens: maxTokens,
                        temperature: temperature
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Request failed');
                }

                const data = await response.json();
                displayResponse(data);

            } catch (error) {
                showError(error.message || 'An error occurred. Please try again.');
            } finally {
                submitBtn.disabled = false;
                document.getElementById('loading').classList.remove('active');
            }
        }

        function displayResponse(data) {
            const responseSection = document.getElementById('responseSection');
            const responseContent = document.getElementById('responseContent');
            const statusBadge = document.getElementById('statusBadge');
            const responseMeta = document.getElementById('responseMeta');

            responseSection.style.display = 'block';

            // Update status badge
            statusBadge.textContent = data.status || 'Unknown';
            statusBadge.className = 'status-badge status-' + (data.status === 'success' ? 'success' : 
                                                               data.status === 'error' ? 'error' : 'pending');

            // Display response
            if (data.generated_text) {
                responseContent.textContent = data.generated_text;
            } else if (data.error) {
                responseContent.textContent = 'Error: ' + data.error;
                statusBadge.className = 'status-badge status-error';
            } else {
                responseContent.textContent = 'No response received';
            }

            // Display metadata
            let metaHtml = '';
            if (data.tokens_generated) {
                metaHtml += `<span>Tokens: ${data.tokens_generated}</span>`;
            }
            if (data.response_time) {
                metaHtml += `<span>Time: ${data.response_time}s</span>`;
            }
            if (data.request_id) {
                metaHtml += `<span>ID: ${data.request_id}</span>`;
            }
            responseMeta.innerHTML = metaHtml;
        }

        function clearResponse() {
            document.getElementById('prompt').value = '';
            document.getElementById('responseSection').style.display = 'none';
            document.getElementById('errorMessage').classList.remove('active');
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        // Allow Enter key to submit (Ctrl+Enter)
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                submitRequest();
            }
        });
    </script>
</body>
</html>
