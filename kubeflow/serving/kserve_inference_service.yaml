apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llm-worker-phi2
  namespace: kubeflow
  annotations:
    serving.kserve.io/deploymentMode: "Serverless"
    autoscaling.knative.dev/minScale: "1"
    autoscaling.knative.dev/maxScale: "10"
spec:
  predictor:
    containers:
    - name: kserve-container
      image: your-registry/llm-worker:latest  # Update with your container registry
      imagePullPolicy: Always
      env:
      - name: MODEL_NAME
        value: "microsoft/phi-2"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "kafka.kafka.svc.cluster.local:9092"
      - name: KAFKA_REQUEST_TOPIC
        value: "llm-requests"
      - name: KAFKA_RESPONSE_TOPIC
        value: "llm-responses"
      - name: KAFKA_CONSUMER_GROUP
        value: "kubeflow-worker-group"
      - name: BATCH_SIZE
        value: "4"
      - name: MAX_SEQUENCE_LENGTH
        value: "512"
      - name: METRICS_PORT
        value: "8080"
      - name: HEALTH_CHECK_PORT
        value: "8081"
      resources:
        requests:
          cpu: "2"
          memory: "8Gi"
          nvidia.com/gpu: "1"  # Optional, for GPU support
        limits:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: "1"  # Optional, for GPU support
      ports:
      - containerPort: 8080
        name: metrics
        protocol: TCP
      - containerPort: 8081
        name: health
        protocol: TCP
      livenessProbe:
        httpGet:
          path: /health
          port: 8081
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10
      readinessProbe:
        httpGet:
          path: /ready
          port: 8081
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: llm-worker-phi2
  namespace: kubeflow
  labels:
    app: llm-worker
    model: phi2
spec:
  selector:
    serving.kserve.io/inferenceservice: llm-worker-phi2
  ports:
  - name: http
    port: 80
    targetPort: 8080
  type: ClusterIP
